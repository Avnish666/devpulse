spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/devpulse
    username: postgres
    password: devpulse
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC


  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user, repo

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

github:
  api:
    base-url: https://api.github.com

server:
  port: 8080
logging:
  level:
    org.springframework.cache: TRACE